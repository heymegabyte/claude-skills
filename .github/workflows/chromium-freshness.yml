name: Chromium UA Freshness Probe

on:
  schedule:
    - cron: '17 9 * * 1'  # Mondays 09:17 UTC — quarterly cadence per fetch-defaults.md
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Fetch current Chrome stable + compare to rules/fetch-defaults.md
        id: probe
        run: |
          CURRENT=$(curl -sf 'https://chromiumdash.appspot.com/fetch_releases?channel=Stable&platform=Mac&num=1' | jq -r '.[0].version')
          MAJOR_CURRENT=$(echo "$CURRENT" | cut -d. -f1)
          MAJOR_PINNED=$(grep -oE 'Chrome/[0-9]+' 15-site-generation/_real-ua.mjs | head -1 | grep -oE '[0-9]+')
          DRIFT=$((MAJOR_CURRENT - MAJOR_PINNED))
          echo "current=$CURRENT" >> "$GITHUB_OUTPUT"
          echo "pinned=$MAJOR_PINNED" >> "$GITHUB_OUTPUT"
          echo "drift=$DRIFT" >> "$GITHUB_OUTPUT"
          echo "Current: $CURRENT (major $MAJOR_CURRENT) | Pinned: $MAJOR_PINNED | Drift: $DRIFT versions"
          if [ "$DRIFT" -ge 5 ]; then echo "::warning::Chrome UA drift ≥5 versions"; fi

      - name: Open issue if drift ≥5 versions
        if: steps.probe.outputs.drift >= 5
        uses: actions/github-script@v8
        with:
          script: |
            const {data: issues} = await github.rest.issues.listForRepo({
              owner: context.repo.owner, repo: context.repo.repo,
              labels: 'chromium-drift', state: 'open',
            });
            if (issues.length > 0) return; // dedup
            await github.rest.issues.create({
              owner: context.repo.owner, repo: context.repo.repo,
              title: `Chrome UA drift: pinned ${{ steps.probe.outputs.pinned }} vs stable ${{ steps.probe.outputs.current }}`,
              labels: ['chromium-drift', 'fetch-defaults'],
              body: [
                'Auto-detected via chromiumdash quarterly probe.',
                '',
                `Current Chrome stable: **${{ steps.probe.outputs.current }}**`,
                `Pinned in 15-site-generation/_real-ua.mjs: **Chrome/${{ steps.probe.outputs.pinned }}**`,
                `Drift: **${{ steps.probe.outputs.drift }} versions**`,
                '',
                'Per rules/fetch-defaults.md, rotate quarterly. Update:',
                '- rules/fetch-defaults.md desktop UA line',
                '- 15-site-generation/_real-ua.mjs REAL_UA_DESKTOP constant',
                '',
                'Close this issue once both are bumped.',
              ].join('\n'),
            });
