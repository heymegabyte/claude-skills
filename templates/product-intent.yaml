# Product Intent Template
# Generated by: 02-goal-and-brief
# Trigger: First prompt for a new project
# Purpose: Capture inferred product intent from a one-line prompt before any code is written.
# The domain name IS the primary signal. Everything else is inferred from context.
#
# Usage: Copy this template into PROJECT_BRIEF.md as YAML frontmatter,
# or generate a standalone .intent.yaml in the project root.

# The folder/domain name that triggered inference
domain: ""

# Product type inferred from domain name + context
# Options: saas | marketing-site | internal-tool | ecommerce | docs | nonprofit | portfolio | community
inferred_product_type: ""

# Who uses this product? Be specific — not "everyone"
# Example: ["small nonprofit directors", "volunteer coordinators", "monthly donors"]
target_users: []

# How does this make money (or sustain itself)?
# Options: subscription | freemium | donation | one-time | free | ad-supported | marketplace-fee
business_model: ""

# One sentence: what does this product do better than alternatives?
# Format: "[Verb] [benefit] for [audience] without [pain point]"
# Example: "Track volunteer hours for small nonprofits without spreadsheet chaos"
primary_value_proposition: ""

# Direct competitors found via web search (03/competitive-analysis)
# Each entry: { name, url, pricing, weakness_we_exploit }
competitors:
  # - name: "Competitor A"
  #   url: "https://competitor-a.com"
  #   pricing: "$29/mo"
  #   weakness_we_exploit: "No free tier, ugly UI"

# Pricing structure — defaults based on product type
# SaaS: free tier + $50/mo pro
# Nonprofit: donation presets ($10/$25/$50/$100/$250/$500)
# Marketing site: N/A
pricing:
  free_tier: true
  paid_tiers:
    # - name: "Pro"
    #   price: "$50/month"
    #   features: ["unlimited projects", "priority support", "custom domain"]
  donation_presets: []  # For nonprofits: [10, 25, 50, 100, 250, 500]

# What this product explicitly does NOT do
# Prevents scope creep. Be specific.
# Example: ["No mobile app (PWA only)", "No marketplace — single-vendor", "No video hosting"]
non_goals: []

# Key assumptions made during inference (tracked for validation)
# Each: { assumption, confidence: high|medium|low, validation_method }
assumptions:
  # - assumption: "Users are non-technical"
  #   confidence: "high"
  #   validation_method: "Domain name implies consumer product"

# Stack overrides from defaults (only if domain/type requires it)
# Leave empty to use CONVENTIONS.md defaults
stack_overrides: {}
  # db: "neon"  # Override D1 default for complex relational needs
  # auth: "none"  # No auth needed for marketing sites

# SEO seed keywords inferred from domain
# Used by 09/seo-and-keywords for initial keyword targeting
seed_keywords: []

# Tone/voice for this specific product (overrides global if set)
# Options: professional | friendly | irreverent | serious | playful
tone: ""

# Generated timestamp
created_at: ""
inference_confidence: ""  # high | medium | low — how confident we are in the inference
